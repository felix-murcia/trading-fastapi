version: '3.8'

services:
  n8n:
    build: .
    container_name: n8n
    restart: unless-stopped
    network_mode: host
    environment:
      - N8N_PORT=5678
      - N8N_HOST=n8n.nbes.blog
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.nbes.blog
      - N8N_PROXY_TRUST=1
      - MASSIVE_API_KEY=${MASSIVE_API_KEY}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - N8N_BLOCK_ENV_ACCESS_IN_FUNCTION_NODES=false
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
